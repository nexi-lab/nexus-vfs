name: Cluster Binary Build (reusable)

on:
  workflow_call:
    inputs:
      upload_retention_days:
        description: Artifact retention in days
        required: false
        type: number
        default: 14

jobs:
  build:
    name: cluster-binary / ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nexusd-cluster-linux-x86_64
            binary: nexusd-cluster
            max_size_bytes: 16252928  # 15.5 MiB — bumped to absorb PR #70/71
                                      # cross-node typed RPC infra
                                      # (FederationPeerClient HAL trait +
                                      # FederationPeerBackend + generic
                                      # dispatch_federation_peer helper +
                                      # transport-side typed VFS RPC wrappers
                                      # & install hook).  Genuinely new
                                      # functionality — closes the cross-node
                                      # sys_readdir/stat/unlink/write boundary
                                      # leak that was the cc-tasks-list mega
                                      # goal blocker.
          - os: macos-14
            artifact_name: nexusd-cluster-macos-arm64
            binary: nexusd-cluster
            max_size_bytes: 13107200  # 12.5 MiB
          - os: macos-14
            artifact_name: nexusd-cluster-macos-x86_64
            binary: nexusd-cluster
            target: x86_64-apple-darwin
            max_size_bytes: 16252928  # 15.5 MiB — same bump as linux for
                                      # PR #70/71.  Holds the same slack %.
          - os: windows-latest
            artifact_name: nexusd-cluster-windows-x86_64
            binary: nexusd-cluster.exe
            max_size_bytes: 14155776  # 13.5 MiB — bumped to absorb #51 substrate
                                      # code growth (4 root-cause fixes + the
                                      # debug-level observability traces they
                                      # carry).  Linux/macOS hold the same %
                                      # of slack.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          PROTOC_VERSION=3.20.2
          case "$(uname -m)" in
            arm64) ARCH=aarch_64 ;;
            x86_64) ARCH=x86_64 ;;
            *) echo "Unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          mkdir -p "$HOME/protoc"
          curl -fsSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-osx-${ARCH}.zip"
          unzip -o /tmp/protoc.zip -d "$HOME/protoc"
          echo "$HOME/protoc/bin" >> "$GITHUB_PATH"
          "$HOME/protoc/bin/protoc" --version

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $protocVersion = '3.20.2'
          $protocDir = Join-Path $env:USERPROFILE 'protoc'
          New-Item -ItemType Directory -Force -Path $protocDir | Out-Null
          $zipPath = Join-Path $env:RUNNER_TEMP 'protoc.zip'
          Invoke-WebRequest -UseBasicParsing -Uri `
            "https://github.com/protocolbuffers/protobuf/releases/download/v${protocVersion}/protoc-${protocVersion}-win64.zip" `
            -OutFile $zipPath
          Expand-Archive -Force -Path $zipPath -DestinationPath $protocDir
          $protocBinDir = Join-Path $protocDir 'bin'
          $protocExe = Join-Path $protocBinDir 'protoc.exe'
          Add-Content -Path $env:GITHUB_PATH -Value $protocBinDir
          Add-Content -Path $env:GITHUB_ENV -Value "PROTOC=$protocExe"
          & $protocExe --version

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          target: ${{ matrix.target || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cluster-binary-${{ matrix.os }}-${{ matrix.target || 'native' }}

      - name: Build release binary
        run: cargo build --release -p nexus-cluster --bin nexusd-cluster ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Check binary size
        shell: bash
        env:
          MAX_SIZE_BYTES: ${{ matrix.max_size_bytes }}
          BINARY_PATH: target/${{ matrix.target && format('{0}/', matrix.target) || '' }}release/${{ matrix.binary }}
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            actual=$(stat -f '%z' "$BINARY_PATH")
          else
            actual=$(stat -c '%s' "$BINARY_PATH")
          fi
          echo "Binary size: $actual bytes (max: $MAX_SIZE_BYTES)"
          if [ "$actual" -gt "$MAX_SIZE_BYTES" ]; then
            echo "::error::nexusd-cluster ${{ matrix.artifact_name }} exceeds size budget ($actual > $MAX_SIZE_BYTES bytes)"
            exit 1
          fi

      - name: Sanity-check --help
        if: ${{ !matrix.target }}
        shell: bash
        run: target/release/${{ matrix.binary }} --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target && format('{0}/', matrix.target) || '' }}release/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: ${{ inputs.upload_retention_days }}
