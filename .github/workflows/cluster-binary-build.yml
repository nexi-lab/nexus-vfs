name: Cluster Binary Build (reusable)

on:
  workflow_call:
    inputs:
      upload_retention_days:
        description: Artifact retention in days
        required: false
        type: number
        default: 14

jobs:
  build:
    name: cluster-binary / ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nexusd-cluster-linux-x86_64
            package: nexus-cluster
            bin: nexusd-cluster
            binary: nexusd-cluster
            max_size_bytes: 16515072  # 15.75 MiB — bumped from 15.5 MiB
                                      # (PR #70/71) to absorb PR #126
                                      # transport_observer: distributed-VFS
                                      # substrate observability primitive
                                      # (dual of peer_blob).  ~250 KiB
                                      # headroom matches the prior
                                      # bump-per-feature idiom.
          - os: macos-14
            artifact_name: nexusd-cluster-macos-arm64
            package: nexus-cluster
            bin: nexusd-cluster
            binary: nexusd-cluster
            max_size_bytes: 14155776  # 13.5 MiB — bumped from 13.25 MiB
                                      # to absorb the S3 Phase D
                                      # DiscoverZones RPC surface (new
                                      # proto messages + server handler
                                      # + client + row-3 dispatch
                                      # wiring).  ~260 KiB headroom
                                      # symmetric with the post-#115
                                      # actual size.
          - os: macos-14
            artifact_name: nexusd-cluster-macos-x86_64
            package: nexus-cluster
            bin: nexusd-cluster
            binary: nexusd-cluster
            target: x86_64-apple-darwin
            max_size_bytes: 16515072  # 15.75 MiB — symmetric bump with
                                      # linux for PR #126 transport_observer.
                                      # Same slack % as post-#70/71.
          - os: windows-latest
            artifact_name: nexusd-cluster-windows-x86_64
            package: nexus-cluster
            bin: nexusd-cluster
            binary: nexusd-cluster.exe
            max_size_bytes: 14942208  # 14.25 MiB — bumped from 14.0 MiB
                                      # to absorb the S3 Phase D
                                      # DiscoverZones RPC surface
                                      # (proto + server + client + row-3
                                      # dispatch wiring).  ~260 KiB
                                      # headroom symmetric with the
                                      # post-#115 actual size.
                                      # Linux/macOS x86_64 hold the same
                                      # % of slack.

          # ── nexusd-collaboration = cluster + the sk- credential policy ──
          # Same entrypoint, one Cargo feature apart. Its own budget rather
          # than a bump to cluster's: the federation binary must not pay for
          # a policy it never runs. Measured delta over nexusd-cluster is
          # 87 KiB (0.6%) — hmac plus two constant-time helpers. Each budget
          # is the matching cluster budget + 0.25 MiB of headroom.
          - os: ubuntu-latest
            artifact_name: nexusd-collaboration-linux-x86_64
            package: nexus-collaboration
            bin: nexusd-collaboration
            binary: nexusd-collaboration
            max_size_bytes: 16777216  # 16.0 MiB
          - os: macos-14
            artifact_name: nexusd-collaboration-macos-arm64
            package: nexus-collaboration
            bin: nexusd-collaboration
            binary: nexusd-collaboration
            max_size_bytes: 14417920  # 13.75 MiB
          - os: macos-14
            artifact_name: nexusd-collaboration-macos-x86_64
            package: nexus-collaboration
            bin: nexusd-collaboration
            binary: nexusd-collaboration
            target: x86_64-apple-darwin
            max_size_bytes: 16777216  # 16.0 MiB
          - os: windows-latest
            artifact_name: nexusd-collaboration-windows-x86_64
            package: nexus-collaboration
            bin: nexusd-collaboration
            binary: nexusd-collaboration.exe
            max_size_bytes: 15204352  # 14.5 MiB

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          PROTOC_VERSION=3.20.2
          case "$(uname -m)" in
            arm64) ARCH=aarch_64 ;;
            x86_64) ARCH=x86_64 ;;
            *) echo "Unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          mkdir -p "$HOME/protoc"
          curl -fsSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-osx-${ARCH}.zip"
          unzip -o /tmp/protoc.zip -d "$HOME/protoc"
          echo "$HOME/protoc/bin" >> "$GITHUB_PATH"
          "$HOME/protoc/bin/protoc" --version

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $protocVersion = '3.20.2'
          $protocDir = Join-Path $env:USERPROFILE 'protoc'
          New-Item -ItemType Directory -Force -Path $protocDir | Out-Null
          $zipPath = Join-Path $env:RUNNER_TEMP 'protoc.zip'
          Invoke-WebRequest -UseBasicParsing -Uri `
            "https://github.com/protocolbuffers/protobuf/releases/download/v${protocVersion}/protoc-${protocVersion}-win64.zip" `
            -OutFile $zipPath
          Expand-Archive -Force -Path $zipPath -DestinationPath $protocDir
          $protocBinDir = Join-Path $protocDir 'bin'
          $protocExe = Join-Path $protocBinDir 'protoc.exe'
          Add-Content -Path $env:GITHUB_PATH -Value $protocBinDir
          Add-Content -Path $env:GITHUB_ENV -Value "PROTOC=$protocExe"
          & $protocExe --version

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          target: ${{ matrix.target || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cluster-binary-${{ matrix.os }}-${{ matrix.target || 'native' }}

      - name: Build release binary
        run: cargo build --release -p ${{ matrix.package }} --bin ${{ matrix.bin }} ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Check binary size
        shell: bash
        env:
          MAX_SIZE_BYTES: ${{ matrix.max_size_bytes }}
          BINARY_PATH: target/${{ matrix.target && format('{0}/', matrix.target) || '' }}release/${{ matrix.binary }}
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            actual=$(stat -f '%z' "$BINARY_PATH")
          else
            actual=$(stat -c '%s' "$BINARY_PATH")
          fi
          echo "Binary size: $actual bytes (max: $MAX_SIZE_BYTES)"
          if [ "$actual" -gt "$MAX_SIZE_BYTES" ]; then
            echo "::error::${{ matrix.artifact_name }} exceeds its size budget ($actual > $MAX_SIZE_BYTES bytes)"
            exit 1
          fi

      - name: Sanity-check --help
        if: ${{ !matrix.target }}
        shell: bash
        run: target/release/${{ matrix.binary }} --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target && format('{0}/', matrix.target) || '' }}release/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: ${{ inputs.upload_retention_days }}
