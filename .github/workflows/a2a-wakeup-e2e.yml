name: A2A wakeup E2E

# Proves the cross-machine interrupt the whole A2A design rests on: a message
# written to a peer-owned `chat-with-me` DT_STREAM wakes a `sys_watch` parked
# on another node — against two real `nexusd-cluster` processes joined into one
# federation, real raft wal-stream replication, and real gRPC. Nothing is
# stubbed. The unit + in-process tests can pass while the composition-root
# arming keys off the wrong zone set (a joiner discovers its shared zone and
# has no federation env, so arming off `NEXUS_FEDERATION_MOUNTS` silently skips
# it), or while a peer that never created the mailbox cannot open it to send —
# only booting the two daemons and driving the wire catches that.

on:
  pull_request:
    paths:
      - "rust/kernel/src/kernel/mod.rs"
      - "rust/kernel/src/kernel/ipc.rs"
      - "rust/kernel/src/kernel/observability.rs"
      - "rust/kernel/src/core/stream/**"
      - "rust/kernel/src/core/file_watch.rs"
      - "rust/raft/src/stream_wakeup.rs"
      - "rust/raft/src/zone_meta_store.rs"
      - "rust/raft/src/bootstrap.rs"
      - "rust/a2a/**"
      - "rust/profiles/**"
      - "proto/nexus/grpc/vfs/vfs.proto"
      - "scripts/e2e_a2a_wakeup.py"
      - ".github/workflows/a2a-wakeup-e2e.yml"
  push:
    branches: [main]

concurrency:
  group: a2a-wakeup-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: a mailbox write wakes a peer's sys_watch
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: short
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: a2a-wakeup-e2e

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install the gRPC client deps
        # The test compiles this repo's own vfs.proto at run time, so the
        # client half can never drift from the server half.
        run: pip install grpcio grpcio-tools

      - name: Build nexusd-cluster
        run: cargo build --release -p nexus-cluster --bin nexusd-cluster

      - name: A mailbox write wakes a peer's parked sys_watch, both directions
        run: python scripts/e2e_a2a_wakeup.py
