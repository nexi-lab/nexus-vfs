name: API-key auth E2E

# Proves `sk-` authentication actually gates the daemon, against a real
# nexusd-cluster process and real gRPC calls — not a mock. The unit
# tests can all pass while the provider is never wired, the store never
# bound, or the boot order silently leaves an empty slot; only running the
# binary catches that. It already has: the first live run died on a rootless
# boot that no unit test could have seen.

on:
  pull_request:
    paths:
      - "rust/auth/**"
      - "rust/profiles/**"
      - "rust/transport/src/auth.rs"
      - "rust/transport/src/grpc.rs"
      - "rust/raft/src/auth_key_store.rs"
      - "rust/raft/src/bootstrap.rs"
      - "rust/profiles/cluster/src/auth_posture.rs"
      - "rust/kernel/src/hal/auth_key_store.rs"
      - "rust/kernel/src/auth/**"
      - "proto/nexus/grpc/vfs/vfs.proto"
      - "scripts/e2e_api_key_auth.py"
      - "scripts/e2e_loopback_invariant.py"
      - ".github/workflows/api-key-auth-e2e.yml"
  push:
    branches: [main]

concurrency:
  group: api-key-auth-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: sk- auth gates the daemon
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: short
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: api-key-auth-e2e

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install the gRPC client deps
        # The test compiles this repo's own vfs.proto at run time, so the
        # client half can never drift from the server half.
        run: pip install grpcio grpcio-tools

      - name: Build nexusd-cluster
        run: cargo build --release -p nexus-cluster --bin nexusd-cluster

      - name: No auth is legal only on loopback
        # The daemon must REFUSE an unauthenticated socket on a reachable
        # address — and must still boot, flagless, on loopback (the shape moss
        # runs). Both halves matter: a guard that breaks the trusted-local
        # backend is not shippable, and one that lets 0.0.0.0 through is not a
        # guard.
        run: python scripts/e2e_loopback_invariant.py

      - name: Mint → authenticate → deny → revoke
        run: python scripts/e2e_api_key_auth.py
