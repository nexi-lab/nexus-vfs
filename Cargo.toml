[workspace]
resolver = "2"
members = [
    "rust/nexus-vfs",
    "rust/nexus-vfs-core",
    "rust/nexus-vfs-cluster",
    "rust/nexus-vfsd",
]
exclude = ["nexus-fuse"]

[workspace.dependencies]
nexus-vfs-core = { path = "rust/nexus-vfs-core", version = "0.1.0", default-features = false }
nexus-vfs-cluster = { path = "rust/nexus-vfs-cluster", version = "0.1.0", default-features = false }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ahash = { version = "0.8", default-features = false, features = ["compile-time-rng", "std"] }
regex = "1.10"
memchr = "2.7"
roaring = "0.11"
globset = "0.4"
blake3 = "1.5"
string-interner = "0.20"
regex-syntax = "0.8"
crc32fast = "1.4"
fastcdc = "4.0"
mimalloc = { version = "0.1", default-features = false }
tonic = { version = "0.14", features = ["transport", "tls-ring"] }
prost = "0.14"
tonic-prost = "0.14"

[profile.dev]
opt-level = 1
debug = "line-tables-only"
incremental = true

[profile.dev.package."*"]
opt-level = 2

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3
strip = "symbols"

[profile.release.package.nexus-vfsd]
opt-level = "z"
