[workspace]
resolver = "2"
members = [
    "rust/contracts",
    "rust/lib",
    "rust/transport",
    "rust/kernel",
    "rust/backends",
    "rust/services",
    "rust/raft",
    "rust/profiles/cluster",
]
# nexus-fuse excluded: standalone FUSE daemon with different dependency versions
exclude = ["nexus-fuse"]

[workspace.dependencies]
contracts = { path = "rust/contracts" }
lib = { path = "rust/lib" }
transport = { path = "rust/transport" }
services = { path = "rust/services" }
backends = { path = "rust/backends", default-features = false }
kernel = { path = "rust/kernel", default-features = false }
raft = { path = "rust/raft", default-features = false, features = ["grpc"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ahash = { version = "0.8", default-features = false, features = ["compile-time-rng", "std"] }
regex = "1.10"
memchr = "2.7"
roaring = "0.11"
globset = "0.4"
blake3 = "1.5"
string-interner = "0.20"
regex-syntax = "0.8"
crc32fast = "1.4"
fastcdc = "4.0"
mimalloc = { version = "0.1", default-features = false }
tonic = { version = "0.14", features = ["transport", "tls-ring"] }
prost = "0.14"
tonic-prost = "0.14"

[profile.dev]
opt-level = 1
debug = "line-tables-only"
incremental = true

[profile.dev.package."*"]
opt-level = 2

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3
strip = "symbols"

[profile.release.package.nexus-cluster]
opt-level = "z"
